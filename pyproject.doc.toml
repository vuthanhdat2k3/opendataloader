[project]
name = "opendataloader-doc-env"
version = "0.1.0"
description = "Separated docling/opendataloader-pdf environment"
requires-python = ">=3.10,<3.11"
dependencies = [
    "opendataloader-pdf[hybrid]==2.2.1",
]

[tool.uv]
index-strategy = "unsafe-best-match"
environments = ["sys_platform == 'linux' and python_version == '3.10' and platform_machine == 'x86_64'"]
